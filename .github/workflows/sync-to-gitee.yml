name: Sync to Gitee

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          echo "::group::检查配置"
          echo "目标仓库: gitee.com/${{ secrets.GITEE_USERNAME }}/${{ secrets.GITEE_REPO }}.git"
          echo "令牌长度: ${#GITEE_TOKEN} 字符"
          echo "::endgroup::"

          echo "::group::测试 Gitee 认证"
          AUTH_URL="https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${{ secrets.GITEE_REPO }}.git"
          if git ls-remote --heads "$AUTH_URL" > /dev/null 2>&1; then
            echo "✅ Gitee 认证成功，仓库存在"
          else
            echo "❌ 无法连接到 Gitee 仓库，请检查："
            echo "  1. GITEE_USERNAME 是否正确（Gitee 用户名，不是邮箱）"
            echo "  2. GITEE_TOKEN 是否有效且已勾选 projects 权限"
            echo "  3. GITEE_REPO 名称是否正确"
            echo "  4. Gitee 上是否存在同名仓库"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::推送代码到 Gitee"
          git remote add gitee "$AUTH_URL"
          git push gitee --all --force
          git push gitee --tags --force
          echo "✅ 同步完成"
          echo "::endgroup::"
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
