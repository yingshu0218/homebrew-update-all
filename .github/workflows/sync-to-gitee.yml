name: Sync to Gitee

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          AUTH_URL="https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${REPO_NAME}.git"

          echo "目标: gitee.com/${{ secrets.GITEE_USERNAME }}/${REPO_NAME}.git"

          if git ls-remote --heads "$AUTH_URL" > /dev/null 2>&1; then
            echo "✅ 连接 Gitee 成功"
          else
            echo "❌ 失败，请检查 ${REPO_NAME} 是否已在 Gitee 创建同名仓库"
            exit 1
          fi

          git remote add gitee "$AUTH_URL"
          git push gitee --all --force
          git push gitee --tags --force
          echo "✅ 同步完成"
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
